<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620" width="760" height="620" font-family="sans-serif">
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="620" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">check_imbalance: Starvation Loop vs Direct Comparison</text>

  <!-- Divider -->
  <line x1="380" y1="42" x2="380" y2="610" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ============ LEFT PANEL ============ -->
  <text x="190" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">Vanilla: shr_bound Starvation Loop</text>

  <!-- Loop background -->
  <rect x="30" y="75" width="320" height="400" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>

  <!-- Step 1: Light task migrated -->
  <rect x="75" y="90" width="230" height="40" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="190" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">1. Light task migrated</text>
  <text x="190" y="121" text-anchor="middle" font-size="10" fill="#b91c1c">ld_moved > 0</text>

  <!-- Arrow 1->2 -->
  <line x1="190" y1="130" x2="190" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Step 2: Counter reset -->
  <rect x="75" y="155" width="230" height="40" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="190" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">2. nr_balance_failed = 0</text>
  <text x="190" y="185" text-anchor="middle" font-size="10" fill="#c2410c">(reset!)</text>

  <!-- Arrow 2->3 -->
  <line x1="190" y1="195" x2="190" y2="215" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Step 3: shr_bound check -->
  <rect x="50" y="220" width="280" height="48" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="190" y="238" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">3. shr_bound(heavy_load, 0)</text>
  <text x="190" y="255" text-anchor="middle" font-size="10" fill="#b91c1c">= heavy_load (no shift when nr_failed=0)</text>

  <!-- Arrow 3->4 -->
  <line x1="190" y1="268" x2="190" y2="288" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Step 4: REJECTED -->
  <rect x="55" y="293" width="270" height="44" rx="6" fill="#fca5a5" stroke="#dc2626" stroke-width="2"/>
  <text x="190" y="311" text-anchor="middle" font-size="11" font-weight="bold" fill="#7f1d1d">4. heavy_load > imbalance</text>
  <text x="190" y="327" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">REJECTED</text>

  <!-- Loop-back arrow (step 4 back to step 1) -->
  <path d="M 325 315 Q 360 315 360 240 Q 360 100 305 100" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="6,3"/>
  <text x="362" y="205" font-size="10" font-weight="bold" fill="#ef4444" transform="rotate(-90,362,205)">LOOP</text>

  <!-- Step 5 label on arrow -->
  <text x="348" y="135" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="600">5. Repeat</text>

  <!-- Problem callout -->
  <rect x="40" y="355" width="300" height="55" rx="6" fill="#dc2626" opacity="0.1"/>
  <rect x="40" y="355" width="300" height="55" rx="6" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="190" y="373" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">KEY PROBLEM</text>
  <text x="190" y="388" text-anchor="middle" font-size="9.5" fill="#7f1d1d">Light migrations perpetually reset the counter</text>
  <text x="190" y="402" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">Heavy tasks NEVER pass</text>

  <!-- Left bottom annotation -->
  <rect x="40" y="425" width="300" height="40" rx="5" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="190" y="442" text-anchor="middle" font-size="9" fill="#881337" font-style="italic">shr_bound relies on nr_balance_failed growing,</text>
  <text x="190" y="455" text-anchor="middle" font-size="9" fill="#881337" font-style="italic">but any ld_moved > 0 resets it to zero.</text>

  <!-- ============ RIGHT PANEL ============ -->
  <text x="570" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">Cambyses: Direct Comparison</text>

  <!-- Flow background -->
  <rect x="410" y="75" width="320" height="400" rx="10" fill="#f0fdf4" stroke="#dcfce7" stroke-width="1.5"/>

  <!-- Step 1: Task load -->
  <rect x="470" y="100" width="200" height="40" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="570" y="117" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">1. Evaluate task load</text>
  <text x="570" y="130" text-anchor="middle" font-size="10" fill="#15803d">vs remaining imbalance</text>

  <!-- Arrow 1->diamond -->
  <line x1="570" y1="140" x2="570" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Decision diamond -->
  <polygon points="570,178 650,228 570,278 490,228" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="570" y="222" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e3a5f">load ></text>
  <text x="570" y="236" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e3a5f">env->imbalance?</text>

  <!-- Yes branch (right) -->
  <line x1="650" y1="228" x2="700" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="672" y="222" font-size="10" font-weight="bold" fill="#64748b">Yes</text>

  <!-- Yes box: Skip -->
  <rect x="640" y="258" width="80" height="50" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="680" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#854d0e">Skip</text>
  <text x="680" y="292" text-anchor="middle" font-size="8.5" fill="#a16207">(genuinely</text>
  <text x="680" y="302" text-anchor="middle" font-size="8.5" fill="#a16207">too heavy)</text>
  <!-- Connect diamond to skip box -->
  <path d="M 700 228 L 700 228 Q 710 228 710 248 L 710 258" stroke="#64748b" stroke-width="1.5" fill="none"/>

  <!-- No branch (down) -->
  <line x1="570" y1="278" x2="570" y2="318" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="556" y="300" font-size="10" font-weight="bold" fill="#22c55e">No</text>

  <!-- No box: Accept -->
  <rect x="475" y="322" width="190" height="44" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="570" y="342" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Accept as candidate</text>
  <text x="570" y="357" text-anchor="middle" font-size="10" fill="#15803d">Task proceeds to migration</text>

  <!-- Benefit callout -->
  <rect x="420" y="385" width="300" height="80" rx="6" fill="#22c55e" opacity="0.08"/>
  <rect x="420" y="385" width="300" height="80" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="570" y="403" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">KEY BENEFIT</text>
  <text x="570" y="420" text-anchor="middle" font-size="9.5" fill="#14532d">No exponential back-off.</text>
  <text x="570" y="435" text-anchor="middle" font-size="9.5" fill="#14532d">No cross-task interference.</text>
  <text x="570" y="450" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">Each task judged independently.</text>

  <!-- ============ BOTTOM SUMMARY ============ -->
  <rect x="30" y="488" width="700" height="54" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="380" y="510" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Summary:</text>
  <text x="380" y="528" text-anchor="middle" font-size="10" fill="#475569">Vanilla's starvation loop causes heavy tasks to be permanently skipped. Cambyses removes the fragile</text>
  <text x="380" y="541" text-anchor="middle" font-size="10" fill="#475569">nr_balance_failed mechanism and compares each task's load directly against the remaining imbalance.</text>

  <!-- Code snippets at bottom -->
  <rect x="30" y="555" width="340" height="50" rx="5" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="40" y="572" font-size="9" fill="#991b1b" font-family="monospace">/* vanilla */</text>
  <text x="40" y="585" font-size="9" fill="#991b1b" font-family="monospace">if (shr_bound(load, env->sd->nr_balance_failed)</text>
  <text x="40" y="598" font-size="9" fill="#991b1b" font-family="monospace">        > env->imbalance)  /* depends on counter */</text>

  <rect x="390" y="555" width="340" height="50" rx="5" fill="#f0fdf4" stroke="#dcfce7" stroke-width="1"/>
  <text x="400" y="572" font-size="9" fill="#166534" font-family="monospace">/* cambyses */</text>
  <text x="400" y="585" font-size="9" fill="#166534" font-family="monospace">if (load > env->imbalance)</text>
  <text x="400" y="598" font-size="9" fill="#166534" font-family="monospace">        /* simple, stateless comparison */</text>
</svg>