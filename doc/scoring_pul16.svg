<svg xmlns="http://www.w3.org/2000/svg" width="760" height="680" viewBox="0 0 760 680">
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="760" height="680" rx="4" fill="white"/>

  <style>
    text { font-family: sans-serif; fill: #1e293b; }
    .title { font-size: 16px; font-weight: bold; }
    .stage-title { font-size: 13px; font-weight: bold; }
    .desc { font-size: 11px; fill: #64748b; }
    .task-label { font-size: 11px; font-weight: 600; }
    .bar-text { font-size: 9.5px; fill: white; font-weight: 600; }
    .score-text { font-size: 12px; font-weight: bold; }
    .verdict { font-size: 11px; font-weight: bold; }
    .note { font-size: 10.5px; fill: #475569; }
    .formula { font-family: 'SF Mono', Consolas, monospace; font-size: 12px; font-weight: 600; }
    .outer-label { font-size: 9.5px; font-weight: 600; }
  </style>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" class="title">pul16 Additive Scoring — Three-Stage Motivation</text>
  <text x="380" y="48" text-anchor="middle" class="desc">Why delta × weight alone is insufficient, and how the exponent offset resolves it</text>

  <!-- Legend -->
  <g transform="translate(140, 60)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#60a5fa"/>
    <text x="18" y="11" font-size="11" fill="#64748b">pul16(Δt) — staleness</text>
    <rect x="190" y="0" width="12" height="12" rx="2" fill="#818cf8"/>
    <text x="208" y="11" font-size="11" fill="#64748b">pul16(weight) — priority</text>
    <rect x="400" y="0" width="12" height="12" rx="2" fill="#6d28d9"/>
    <text x="418" y="11" font-size="11" fill="#64748b">exponent boost (×1.3)</text>
  </g>

  <!-- Shared example context -->
  <g transform="translate(30, 88)">
    <rect x="0" y="0" width="700" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="350" y="18" text-anchor="middle" font-size="11" fill="#64748b">
      Heavy: nice 0, weight=1024, Δt=4ms    vs    Light: nice 19, weight=15, Δt=200ms
    </text>
  </g>

  <!-- Scale: max 35,840 maps to 350px. 1px ≈ 102.4 -->

  <!-- ==================== STAGE 1: Staleness only ==================== -->
  <g transform="translate(30, 136)">
    <rect x="0" y="0" width="700" height="130" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>

    <text x="16" y="22" class="stage-title" fill="#dc2626">Stage 1: Staleness only</text>
    <text x="16" y="38" class="formula" fill="#dc2626">score = pul16(Δt)</text>

    <!-- Heavy: pul16(4ms) = 22,528 → 220px -->
    <text x="16" y="62" class="task-label">Heavy</text>
    <rect x="70" y="50" width="220" height="20" rx="4" fill="#60a5fa"/>
    <text x="80" y="64" class="bar-text">pul16(4ms) = 22,528</text>
    <text x="300" y="64" class="score-text">22,528</text>

    <!-- Light: pul16(200ms) = 28,928 → 283px -->
    <text x="16" y="90" class="task-label">Light</text>
    <rect x="70" y="78" width="283" height="20" rx="4" fill="#60a5fa"/>
    <text x="80" y="92" class="bar-text">pul16(200ms) = 28,928</text>
    <text x="363" y="92" class="score-text">28,928</text>

    <!-- Verdict -->
    <g transform="translate(470, 50)">
      <rect x="0" y="0" width="216" height="56" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
      <text x="108" y="22" text-anchor="middle" class="verdict" fill="#dc2626">Light wins — WRONG</text>
      <text x="108" y="40" text-anchor="middle" font-size="10" fill="#dc2626">Longer wait dominates; priority ignored</text>
    </g>
  </g>

  <!-- Down arrow 1→2 -->
  <path d="M380,270 L380,290" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="398" y="284" font-size="10" fill="#64748b">add weight</text>

  <!-- ==================== STAGE 2: delta × weight ==================== -->
  <g transform="translate(30, 298)">
    <rect x="0" y="0" width="700" height="130" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>

    <text x="16" y="22" class="stage-title" fill="#a16207">Stage 2: Δt × weight  (log space: pul16(Δt) + pul16(w))</text>
    <text x="16" y="38" class="formula" fill="#a16207">score = pul16(Δt) + pul16(weight)</text>

    <!-- Heavy: 22,528(220) + 10,240(100) = 32,768 → 320px -->
    <text x="16" y="62" class="task-label">Heavy</text>
    <rect x="70" y="50" width="220" height="20" rx="4" fill="#60a5fa"/>
    <text x="80" y="64" class="bar-text">22,528</text>
    <rect x="290" y="50" width="100" height="20" rx="4" fill="#818cf8"/>
    <text x="298" y="64" class="bar-text">10,240</text>
    <text x="400" y="64" class="score-text">32,768</text>

    <!-- Light: 28,928(283) + 3,840(37) = 32,768 → 320px -->
    <text x="16" y="90" class="task-label">Light</text>
    <rect x="70" y="78" width="283" height="20" rx="4" fill="#60a5fa" opacity="0.65"/>
    <text x="80" y="92" class="bar-text">28,928</text>
    <rect x="353" y="78" width="37" height="20" rx="4" fill="#818cf8" opacity="0.65"/>
    <text x="400" y="92" class="score-text" fill="#64748b">32,768</text>

    <!-- Verdict -->
    <g transform="translate(490, 50)">
      <rect x="0" y="0" width="196" height="56" rx="6" fill="#fffbeb" stroke="#a16207" stroke-width="1.5"/>
      <text x="98" y="22" text-anchor="middle" class="verdict" fill="#a16207">TIE — indistinguishable</text>
      <text x="98" y="40" text-anchor="middle" font-size="10" fill="#a16207">Staleness gap = weight gap exactly</text>
    </g>
  </g>

  <!-- Down arrow 2→3 -->
  <path d="M380,432 L380,452" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="398" y="446" font-size="10" fill="#64748b">add exponent offset</text>

  <!-- ==================== STAGE 3: + exponent offset ==================== -->
  <g transform="translate(30, 460)">
    <rect x="0" y="0" width="700" height="130" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>

    <text x="16" y="22" class="stage-title" fill="#166534">Stage 3: + exponent offset  (coeff=308 → weight^1.3)</text>
    <text x="16" y="38" class="formula" fill="#166534">score = pul16(Δt) + pul16(weight) × (1 + 308/1024)</text>

    <!-- Heavy: 22,528(220) + 10,240(100) + boost 3,072(30) = 35,840 → 350px -->
    <text x="16" y="62" class="task-label">Heavy</text>
    <rect x="70" y="50" width="220" height="20" rx="4" fill="#60a5fa"/>
    <text x="80" y="64" class="bar-text">22,528</text>
    <rect x="290" y="50" width="100" height="20" rx="4" fill="#818cf8"/>
    <text x="298" y="64" class="bar-text">10,240</text>
    <rect x="390" y="50" width="30" height="20" rx="4" fill="#6d28d9"/>
    <text x="430" y="64" class="score-text" fill="#166534">35,840</text>

    <!-- Light: 28,928(283) + 3,840(37) + boost 1,152(11) = 33,920 → 331px -->
    <text x="16" y="90" class="task-label">Light</text>
    <rect x="70" y="78" width="283" height="20" rx="4" fill="#60a5fa" opacity="0.65"/>
    <text x="80" y="92" class="bar-text">28,928</text>
    <rect x="353" y="78" width="37" height="20" rx="4" fill="#818cf8" opacity="0.65"/>
    <rect x="390" y="78" width="11" height="20" rx="4" fill="#6d28d9" opacity="0.65"/>
    <text x="411" y="92" class="score-text" fill="#64748b">33,920</text>

    <!-- Verdict -->
    <g transform="translate(490, 50)">
      <rect x="0" y="0" width="196" height="56" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
      <text x="98" y="22" text-anchor="middle" class="verdict" fill="#166534">Heavy wins — decisive</text>
      <text x="98" y="40" text-anchor="middle" font-size="10" fill="#166534">Margin: 1,920 (5.7%)</text>
    </g>
  </g>

  <!-- ==================== Bottom annotation ==================== -->
  <g transform="translate(30, 604)">
    <rect x="0" y="0" width="700" height="60" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
    <rect x="0" y="0" width="700" height="3" rx="2" fill="#64748b"/>
    <text x="16" y="20" class="note" font-weight="bold">Why this matters:</text>
    <text x="16" y="36" class="note">Δt × weight is the mathematically correct compensation — but the staleness gap can exactly cancel the weight gap.</text>
    <text x="16" y="52" class="note">The exponent offset (weight^1.3) amplifies the heavy task's advantage super-linearly, breaking the tie decisively.</text>
  </g>
</svg>