<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 720" width="760" font-family="sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="720" rx="8" fill="#ffffff"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Progressive Newidle Gate Relaxation</text>
  <text x="380" y="56" text-anchor="middle" font-size="12" fill="#64748b">Pass 1 → Pass 2 → Pass 3</text>

  <!-- ======================== PASS 1 ======================== -->
  <g transform="translate(30, 75)">
    <rect width="700" height="150" rx="10" fill="#dbeafe" filter="url(#shadow)"/>
    <rect width="700" height="30" rx="10" fill="#93c5fd"/>
    <rect y="10" width="700" height="20" fill="#93c5fd"/>
    <text x="20" y="21" font-size="14" font-weight="bold" fill="#1e3a5f">Pass 1 — Normal</text>

    <!-- Gate icon: narrow opening -->
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="28" height="90" rx="4" fill="#3b82f6" opacity="0.7"/>
      <rect x="70" y="0" width="28" height="90" rx="4" fill="#3b82f6" opacity="0.7"/>
      <!-- Narrow gap between walls -->
      <rect x="28" y="0" width="42" height="8" fill="#3b82f6" opacity="0.4"/>
      <rect x="28" y="82" width="42" height="8" fill="#3b82f6" opacity="0.4"/>
      <!-- Opening indicator -->
      <line x1="35" y1="18" x2="35" y2="72" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="3,3"/>
      <line x1="63" y1="18" x2="63" y2="72" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="3,3"/>
      <text x="49" y="50" text-anchor="middle" font-size="9" fill="#1e40af" font-weight="bold">▸◂</text>
    </g>

    <!-- Checks -->
    <g transform="translate(140, 65)">
      <text x="0" y="0" font-size="13" fill="#1e293b">
        <tspan fill="#16a34a" font-weight="bold">✓</tspan> Budget check
      </text>
      <text x="0" y="24" font-size="13" fill="#1e293b">
        <tspan fill="#16a34a" font-weight="bold">✓</tspan> Cache-hot check
      </text>
      <text x="0" y="56" font-size="12" fill="#475569" font-style="italic">Standard filtering — most restrictive</text>
    </g>

    <!-- Outcome box -->
    <g transform="translate(440, 62)">
      <rect width="230" height="60" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
      <text x="115" y="24" text-anchor="middle" font-size="12" fill="#1e293b">If candidates found →</text>
      <text x="115" y="42" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">migrate best candidate</text>
    </g>
  </g>

  <!-- Arrow Pass 1 → Pass 2 -->
  <g transform="translate(380, 225)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="-65" y="8" width="130" height="22" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text x="0" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">0 candidates</text>
  </g>

  <!-- ======================== PASS 2 ======================== -->
  <g transform="translate(30, 275)">
    <rect width="700" height="150" rx="10" fill="#fef3c7" filter="url(#shadow)"/>
    <rect width="700" height="30" rx="10" fill="#fcd34d"/>
    <rect y="10" width="700" height="20" fill="#fcd34d"/>
    <text x="20" y="21" font-size="14" font-weight="bold" fill="#78350f">Pass 2 — Drop Budget</text>

    <!-- Gate icon: medium opening -->
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="22" height="90" rx="4" fill="#d97706" opacity="0.7"/>
      <rect x="76" y="0" width="22" height="90" rx="4" fill="#d97706" opacity="0.7"/>
      <!-- Wider gap -->
      <rect x="22" y="0" width="54" height="6" fill="#d97706" opacity="0.4"/>
      <rect x="22" y="84" width="54" height="6" fill="#d97706" opacity="0.4"/>
      <!-- Opening indicator -->
      <line x1="30" y1="16" x2="30" y2="74" stroke="#92400e" stroke-width="1.5" stroke-dasharray="3,3"/>
      <line x1="68" y1="16" x2="68" y2="74" stroke="#92400e" stroke-width="1.5" stroke-dasharray="3,3"/>
      <text x="49" y="50" text-anchor="middle" font-size="9" fill="#92400e" font-weight="bold">▸ ◂</text>
    </g>

    <!-- Checks -->
    <g transform="translate(140, 65)">
      <text x="0" y="0" font-size="13" fill="#1e293b">
        <tspan fill="#dc2626" font-weight="bold">✗</tspan> Budget check
        <tspan font-size="11" fill="#92400e">(allow overshoot)</tspan>
      </text>
      <text x="0" y="24" font-size="13" fill="#1e293b">
        <tspan fill="#16a34a" font-weight="bold">✓</tspan> Cache-hot check
      </text>
      <text x="0" y="56" font-size="12" fill="#475569" font-style="italic">Relax budget — accept overweight tasks</text>
    </g>

    <!-- Outcome box -->
    <g transform="translate(440, 62)">
      <rect width="230" height="60" rx="6" fill="#ffffff" stroke="#fcd34d" stroke-width="1.5"/>
      <text x="115" y="24" text-anchor="middle" font-size="12" fill="#1e293b">If candidates found →</text>
      <text x="115" y="42" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">migrate best candidate</text>
    </g>
  </g>

  <!-- Arrow Pass 2 → Pass 3 -->
  <g transform="translate(380, 425)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="-65" y="8" width="130" height="22" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text x="0" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">0 candidates</text>
  </g>

  <!-- ======================== PASS 3 ======================== -->
  <g transform="translate(30, 475)">
    <rect width="700" height="150" rx="10" fill="#fecaca" filter="url(#shadow)"/>
    <rect width="700" height="30" rx="10" fill="#fca5a5"/>
    <rect y="10" width="700" height="20" fill="#fca5a5"/>
    <text x="20" y="21" font-size="14" font-weight="bold" fill="#7f1d1d">Pass 3 — Drop All Gates</text>

    <!-- Gate icon: wide opening -->
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="14" height="90" rx="4" fill="#dc2626" opacity="0.7"/>
      <rect x="84" y="0" width="14" height="90" rx="4" fill="#dc2626" opacity="0.7"/>
      <!-- Minimal top/bottom -->
      <rect x="14" y="0" width="70" height="4" fill="#dc2626" opacity="0.3"/>
      <rect x="14" y="86" width="70" height="4" fill="#dc2626" opacity="0.3"/>
      <!-- Opening indicator -->
      <line x1="22" y1="14" x2="22" y2="76" stroke="#991b1b" stroke-width="1.5" stroke-dasharray="3,3"/>
      <line x1="76" y1="14" x2="76" y2="76" stroke="#991b1b" stroke-width="1.5" stroke-dasharray="3,3"/>
      <text x="49" y="50" text-anchor="middle" font-size="9" fill="#991b1b" font-weight="bold">▸   ◂</text>
    </g>

    <!-- Checks -->
    <g transform="translate(140, 65)">
      <text x="0" y="0" font-size="13" fill="#1e293b">
        <tspan fill="#dc2626" font-weight="bold">✗</tspan> Budget check
      </text>
      <text x="0" y="24" font-size="13" fill="#1e293b">
        <tspan fill="#dc2626" font-weight="bold">✗</tspan> Cache-hot check
      </text>
      <text x="0" y="56" font-size="12" fill="#475569" font-style="italic">Last resort — any movable task</text>
      <text x="0" y="74" font-size="11" font-weight="600" fill="#991b1b">Prevents CPU from sitting idle</text>
    </g>

    <!-- Outcome box -->
    <g transform="translate(440, 62)">
      <rect width="230" height="60" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5"/>
      <text x="115" y="24" text-anchor="middle" font-size="12" fill="#1e293b">If candidates found →</text>
      <text x="115" y="42" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">migrate best candidate</text>
    </g>
  </g>

  <!-- ======================== FOOTER NOTES ======================== -->

  <!-- Key point -->
  <g transform="translate(30, 645)">
    <rect width="700" height="32" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="350" y="21" text-anchor="middle" font-size="12" fill="#1e293b">
      <tspan font-weight="bold">Key:</tspan> svec and Phase 0 scores are reused — only the filter loop re-runs. Additional cost: <tspan font-weight="bold">minimal.</tspan>
    </text>
  </g>

  <!-- Safety note -->
  <g transform="translate(30, 685)">
    <rect width="700" height="28" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="350" y="19" text-anchor="middle" font-size="12" fill="#1e293b">
      <tspan font-weight="bold">Safety:</tspan> Source retains ≥1 running task
      <tspan font-size="11" fill="#64748b">(nr_running > 1 gate)</tspan>
    </text>
  </g>
</svg>