<svg xmlns="http://www.w3.org/2000/svg" width="760" height="370" viewBox="0 0 760 370">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', sans-serif; fill: #1e293b; }
      .header { font-size: 14px; font-weight: 700; }
      .subheader { font-size: 11px; font-weight: 600; }
      .label { font-size: 10px; font-weight: 600; }
      .small { font-size: 9px; }
      .tiny { font-size: 8px; }
      .caption { font-size: 10px; fill: #64748b; font-style: italic; }
      .formula { font-size: 9.5px; font-family: 'SF Mono', 'Consolas', monospace; fill: #475569; }
      .arrow-text { font-size: 9px; fill: #94a3b8; font-weight: 600; }
      .score { font-size: 9px; font-weight: 700; }
    </style>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="370" fill="white" rx="6"/>

  <!-- Divider -->
  <line x1="380" y1="20" x2="380" y2="350" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ==================== LEFT SIDE: Vanilla CFS ==================== -->
  <text x="190" y="38" text-anchor="middle" class="header">Vanilla CFS: FIFO Tail Scan</text>

  <!-- Linked list: HEAD ← [H 4ms] ← [H 8ms] ← [L 30ms] ← [L 50ms] ← TAIL -->
  <!-- Wait increases toward TAIL (oldest tasks at tail) -->

  <!-- HEAD label -->
  <text x="22" y="108" class="subheader" text-anchor="middle">HEAD</text>

  <!-- Task H 4ms (recently ran, at HEAD) -->
  <rect x="44" y="80" width="62" height="44" rx="6" fill="#3b82f6" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="75" y="98" text-anchor="middle" class="label" fill="white">H</text>
  <text x="75" y="113" text-anchor="middle" class="small" fill="white">wait: 4ms</text>

  <!-- Arrow H4 ← H8 -->
  <line x1="106" y1="102" x2="120" y2="102" stroke="#94a3b8" stroke-width="1.5" marker-end="none"/>
  <polygon points="108,99 108,105 103,102" fill="#94a3b8"/>

  <!-- Task H 8ms -->
  <rect x="120" y="80" width="62" height="44" rx="6" fill="#3b82f6" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="151" y="98" text-anchor="middle" class="label" fill="white">H</text>
  <text x="151" y="113" text-anchor="middle" class="small" fill="white">wait: 8ms</text>

  <!-- Arrow H8 ← L30 -->
  <line x1="182" y1="102" x2="196" y2="102" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="184,99 184,105 179,102" fill="#94a3b8"/>

  <!-- Task L 30ms -->
  <rect x="196" y="80" width="62" height="44" rx="6" fill="#93c5fd" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="227" y="98" text-anchor="middle" class="label" fill="#1e293b">L</text>
  <text x="227" y="113" text-anchor="middle" class="small" fill="#1e293b">wait: 30ms</text>

  <!-- Arrow L30 ← L50 -->
  <line x1="258" y1="102" x2="272" y2="102" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="260,99 260,105 255,102" fill="#94a3b8"/>

  <!-- Task L 50ms (SELECTED - orange, at TAIL) -->
  <rect x="272" y="76" width="62" height="52" rx="6" fill="#f97316" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <text x="303" y="96" text-anchor="middle" class="label" fill="white">L</text>
  <text x="303" y="111" text-anchor="middle" class="small" fill="white">wait: 50ms</text>
  <text x="303" y="122" text-anchor="middle" class="tiny" fill="#fff7ed">selected!</text>

  <!-- TAIL label -->
  <text x="350" y="108" class="subheader" text-anchor="middle">TAIL</text>

  <!-- Scan direction arrow -->
  <line x1="340" y1="140" x2="280" y2="140" stroke="#f97316" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="282,137 282,143 277,140" fill="#f97316"/>
  <text x="310" y="154" text-anchor="middle" class="arrow-text" fill="#f97316">scan direction</text>

  <!-- "Selected" callout -->
  <rect x="40" y="172" width="300" height="52" rx="5" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="190" y="190" text-anchor="middle" class="small" fill="#9a3412">First eligible task from tail is selected.</text>
  <text x="190" y="204" text-anchor="middle" class="small" fill="#9a3412">Light task (w=15) picked despite heavy tasks</text>
  <text x="190" y="217" text-anchor="middle" class="small" fill="#9a3412">(w=1024) resolving far more imbalance.</text>

  <!-- Caption -->
  <text x="190" y="245" text-anchor="middle" class="caption">First eligible from tail -- ignores staleness and weight</text>

  <!-- ==================== RIGHT SIDE: Cambyses ==================== -->
  <text x="570" y="38" text-anchor="middle" class="header">Cambyses: Scored Selection</text>

  <!-- Task boxes with scores, ranked by score (not by position) -->
  <!-- Task H 8ms - highest score, selected by Cambyses -->
  <g transform="translate(400, 60)">
    <rect x="0" y="0" width="155" height="40" rx="6" fill="#22c55e" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
    <text x="12" y="17" class="label" fill="white">H</text>
    <text x="12" y="30" class="small" fill="white">wait: 8ms, w=1024</text>
    <text x="145" y="24" text-anchor="end" class="score" fill="white">score: 874</text>
    <!-- Winner indicator -->
    <rect x="160" y="8" width="54" height="22" rx="4" fill="#16a34a"/>
    <text x="187" y="23" text-anchor="middle" class="tiny" fill="white">WINNER</text>
  </g>

  <!-- Task H 4ms -->
  <g transform="translate(400, 108)">
    <rect x="0" y="0" width="155" height="40" rx="6" fill="#3b82f6" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
    <text x="12" y="17" class="label" fill="white">H</text>
    <text x="12" y="30" class="small" fill="white">wait: 4ms, w=1024</text>
    <text x="145" y="24" text-anchor="end" class="score" fill="#dbeafe">score: 710</text>
  </g>

  <!-- Task L 50ms -->
  <g transform="translate(400, 156)">
    <rect x="0" y="0" width="155" height="40" rx="6" fill="#93c5fd" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
    <text x="12" y="17" class="label" fill="#1e293b">L</text>
    <text x="12" y="30" class="small" fill="#1e293b">wait: 50ms, w=15</text>
    <text x="145" y="24" text-anchor="end" class="score" fill="#1e3a5f">score: 306</text>
  </g>

  <!-- Task L 30ms -->
  <g transform="translate(400, 204)">
    <rect x="0" y="0" width="155" height="40" rx="6" fill="#93c5fd" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
    <text x="12" y="17" class="label" fill="#1e293b">L</text>
    <text x="12" y="30" class="small" fill="#1e293b">wait: 30ms, w=15</text>
    <text x="145" y="24" text-anchor="end" class="score" fill="#1e3a5f">score: 285</text>
  </g>

  <!-- Ranking bracket -->
  <path d="M 560 75 Q 572 75, 572 95 L 572 225 Q 572 240, 560 240" fill="none" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="580" y="162" class="small" fill="#94a3b8" transform="rotate(90, 580, 162)">ranked</text>

  <!-- Score formula box -->
  <rect x="400" y="262" width="320" height="40" rx="5" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="560" y="278" text-anchor="middle" class="formula">score = pul16(delta_t) + pul16(weight) * 1.3</text>
  <text x="560" y="293" text-anchor="middle" class="tiny" fill="#64748b">Combines wait time and task weight into a single metric</text>

  <!-- Caption -->
  <text x="570" y="325" text-anchor="middle" class="caption">Highest score wins -- optimal for migration</text>

  <!-- ==================== Bottom legend ==================== -->
  <g transform="translate(180, 340)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#3b82f6"/>
    <text x="20" y="11" class="tiny">Heavy task</text>
    <rect x="80" y="0" width="14" height="14" rx="3" fill="#93c5fd"/>
    <text x="100" y="11" class="tiny">Light task</text>
    <rect x="160" y="0" width="14" height="14" rx="3" fill="#f97316"/>
    <text x="180" y="11" class="tiny">CFS pick (suboptimal)</text>
    <rect x="280" y="0" width="14" height="14" rx="3" fill="#22c55e"/>
    <text x="300" y="11" class="tiny">Cambyses pick (optimal)</text>
  </g>
</svg>